name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull, restart, health-check
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              'set -e
               cd /opt/today_tactics
               git pull
               sudo systemctl restart today_tactics
               sleep 3
               curl -sf -o /dev/null -w "health=%{http_code}\n" http://127.0.0.1:5000/'
