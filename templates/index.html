<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today Tactics - 축구 전술판</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <h1>Today Tactics</h1>
            <div class="toolbar-group">
                <button id="btn-select" class="mode-btn active" title="선수 이동 모드">이동</button>
                <button id="btn-erase" class="mode-btn" title="선 하나씩 지우기">✕ 지우기</button>
                <span class="toolbar-sep">|</span>
                <button class="mode-btn draw-mode-btn" data-draw="arrow" title="실선 화살표">→ 실선</button>
                <button class="mode-btn draw-mode-btn" data-draw="dashedArrow" title="점선 화살표">⇢ 점선</button>
                <button class="mode-btn draw-mode-btn" data-draw="curvedArrow" title="곡선 화살표">↷ 곡선</button>
                <button class="mode-btn draw-mode-btn" data-draw="multiArrow" title="꺾기 화살표 (우클릭으로 완료)">⤡ 꺾기</button>
                <button class="mode-btn draw-mode-btn" data-draw="line" title="실선">― 실선</button>
                <button class="mode-btn draw-mode-btn" data-draw="dashedLine" title="점선">┄ 점선</button>
            </div>
            <div class="toolbar-group color-swatches" title="선 색상">
                <span class="color-swatch active" data-color="rgba(255,255,255,0.85)"></span>
                <span class="color-swatch" data-color="rgba(255,68,68,0.9)"></span>
                <span class="color-swatch" data-color="rgba(68,170,255,0.9)"></span>
                <span class="color-swatch" data-color="rgba(255,221,0,0.9)"></span>
                <span class="color-swatch" data-color="rgba(68,255,100,0.9)"></span>
                <span class="color-swatch" data-color="rgba(255,140,0,0.9)"></span>
            </div>
            <div class="toolbar-group" style="align-items:center;gap:6px;">
                <span style="font-size:12px;color:#ccc;">속도</span>
                <input id="anim-speed" type="range" min="0.5" max="4" step="0.5" value="1" style="width:80px;cursor:pointer;">
                <span id="anim-speed-label" style="font-size:12px;color:#fff;min-width:28px;">1.0x</span>
            </div>
            <div class="toolbar-group">
                <button id="btn-add-ball" class="action-btn" title="축구공 추가">⚽ 공 추가</button>
                <button id="btn-clear-lines" class="action-btn" title="그리기 지우기">그리기 지우기</button>
                <button id="btn-undo-line" class="action-btn" title="마지막 선 취소">실행취소</button>
                <button id="btn-reset" class="action-btn" title="전체 초기화">초기화</button>
            </div>
            <div class="toolbar-group">
                <button id="btn-save" class="action-btn save-btn" title="현재 전술 저장">저장</button>
                <button id="btn-load" class="action-btn load-btn" title="저장된 전술 불러오기">불러오기</button>
            </div>
            <div class="toolbar-group legend">
                <span class="legend-item team-a">HOME</span>
                <span class="legend-item team-b">AWAY</span>
            </div>
        </header>
        <!-- 팀 선택 배너 -->
        <div id="team-banner">
            <div class="team-slot" id="slot-a">
                <div class="team-slot-badge" id="badge-a">
                    <span class="badge-letter">A</span>
                </div>
                <div class="team-slot-info">
                    <span class="team-slot-name" id="name-a">HOME</span>
                    <div class="team-slot-controls">
                        <button class="team-pick-btn" data-side="A">팀 선택</button>
                        <button class="kit-toggle-btn active" data-side="A" data-kit="home">HOME</button>
                        <button class="kit-toggle-btn" data-side="A" data-kit="away">AWAY</button>
                        <select class="formation-select-team" data-side="A" title="HOME 포메이션">
                            <option value="4-4-2">4-4-2</option>
                            <option value="4-3-3">4-3-3</option>
                            <option value="3-5-2">3-5-2</option>
                            <option value="4-2-3-1">4-2-3-1</option>
                            <option value="4-1-4-1">4-1-4-1</option>
                            <option value="3-4-3">3-4-3</option>
                            <option value="5-3-2">5-3-2</option>
                            <option value="5-4-1">5-4-1</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="team-banner-vs">VS</div>
            <div class="team-slot" id="slot-b">
                <div class="team-slot-badge" id="badge-b">
                    <span class="badge-letter">B</span>
                </div>
                <div class="team-slot-info">
                    <span class="team-slot-name" id="name-b">AWAY</span>
                    <div class="team-slot-controls">
                        <button class="team-pick-btn" data-side="B">팀 선택</button>
                        <button class="kit-toggle-btn active" data-side="B" data-kit="home">HOME</button>
                        <button class="kit-toggle-btn" data-side="B" data-kit="away">AWAY</button>
                        <select class="formation-select-team" data-side="B" title="AWAY 포메이션">
                            <option value="4-4-2">4-4-2</option>
                            <option value="4-3-3">4-3-3</option>
                            <option value="3-5-2">3-5-2</option>
                            <option value="4-2-3-1">4-2-3-1</option>
                            <option value="4-1-4-1">4-1-4-1</option>
                            <option value="3-4-3">3-4-3</option>
                            <option value="5-3-2">5-3-2</option>
                            <option value="5-4-1">5-4-1</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div id="main-area">
            <main id="canvas-container">
                <canvas id="field"></canvas>
            </main>
            <aside id="bench-panel">
                <div class="bench-section" data-side="A">
                    <div class="bench-header">
                        <span class="bench-team-name" id="bench-name-a">HOME</span>
                        <button class="bench-add-btn" data-side="A" title="선수 추가">+ 추가</button>
                    </div>
                    <div class="bench-players" id="bench-list-a"></div>
                    <div class="bench-squad-bar">
                        <button class="squad-btn squad-save-btn" data-side="A" title="현재 선수 명단 저장">스쿼드 저장</button>
                        <button class="squad-btn squad-load-btn" data-side="A" title="저장된 스쿼드 불러오기">스쿼드 불러오기</button>
                        <button class="squad-btn team-reset-btn" data-side="A" title="HOME 팀 초기화">초기화</button>
                    </div>
                </div>
                <div class="bench-section" data-side="B">
                    <div class="bench-header">
                        <span class="bench-team-name" id="bench-name-b">AWAY</span>
                        <button class="bench-add-btn" data-side="B" title="선수 추가">+ 추가</button>
                    </div>
                    <div class="bench-players" id="bench-list-b"></div>
                    <div class="bench-squad-bar">
                        <button class="squad-btn squad-save-btn" data-side="B" title="현재 선수 명단 저장">스쿼드 저장</button>
                        <button class="squad-btn squad-load-btn" data-side="B" title="저장된 스쿼드 불러오기">스쿼드 불러오기</button>
                        <button class="squad-btn team-reset-btn" data-side="B" title="AWAY 팀 초기화">초기화</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 선수 정보 툴팁 -->
    <div id="player-tooltip" style="
        display:none; position:fixed; z-index:9999;
        background:rgba(10,15,30,0.95); color:#fff;
        border:1px solid rgba(255,255,255,0.15); border-radius:8px;
        padding:10px 14px; font-size:12px; line-height:1.7;
        pointer-events:none; min-width:130px; box-shadow:0 4px 16px rgba(0,0,0,0.5);
    "></div>

    <!-- 선수 추가 팝업 -->
    <div id="add-player-popup" class="player-edit-popup hidden">
        <div class="player-edit-header">
            <span id="add-player-team-label" class="player-edit-team-label">Team</span>
            <button id="add-player-close" class="player-edit-close-btn">&times;</button>
        </div>
        <div class="player-edit-row">
            <label for="add-player-number">등번호</label>
            <input type="number" id="add-player-number" min="1" max="99">
        </div>
        <div class="player-edit-row">
            <label for="add-player-name">이름/포지션</label>
            <input type="text" id="add-player-name" maxlength="20" placeholder="예: 홍길동 (ST)">
        </div>
        <button id="add-player-confirm" class="player-edit-confirm-btn">추가</button>
    </div>

    <!-- 슬롯 선수 선택 팝업 -->
    <div id="slot-picker" class="slot-picker hidden">
        <div class="slot-picker-header">
            <span id="slot-picker-label"></span>
            <button id="slot-picker-close" class="player-edit-close-btn">&times;</button>
        </div>
        <div id="slot-picker-list" class="slot-picker-list"></div>
    </div>

    <!-- 선수 편집 팝업 -->
    <div id="player-edit-popup" class="player-edit-popup hidden">
        <div class="player-edit-header">
            <span id="player-edit-team-label" class="player-edit-team-label">Team A</span>
            <button id="player-edit-close" class="player-edit-close-btn">&times;</button>
        </div>
        <div class="player-edit-row">
            <label for="player-edit-number">등번호</label>
            <input type="number" id="player-edit-number" min="1" max="99">
        </div>
        <div class="player-edit-row">
            <label for="player-edit-name">이름</label>
            <input type="text" id="player-edit-name" maxlength="20" placeholder="선수 이름">
        </div>
        <div id="player-edit-meta" class="player-edit-meta hidden">
            <div class="player-edit-meta-row">
                <span id="player-edit-pos" class="player-meta-badge"></span>
                <span id="player-edit-body" class="player-meta-body"></span>
            </div>
            <div class="player-meta-dob" id="player-edit-dob"></div>
        </div>
        <button id="player-edit-confirm" class="player-edit-confirm-btn">확인</button>
    </div>

    <!-- 저장 모달 -->
    <div id="save-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2 id="save-modal-title">전술 저장</h2>
            <label for="save-name-input">전술 이름</label>
            <input type="text" id="save-name-input" placeholder="예: 공격 전술 A" maxlength="50">
            <div class="modal-actions">
                <button id="save-modal-cancel" class="modal-btn cancel">취소</button>
                <button id="save-modal-confirm" class="modal-btn confirm">저장</button>
            </div>
        </div>
    </div>

    <!-- 불러오기 모달 -->
    <div id="load-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content load-modal-content">
            <h2>저장된 전술</h2>
            <div id="saves-list" class="saves-list">
                <p class="empty-msg">저장된 전술이 없습니다.</p>
            </div>
            <div class="modal-actions">
                <button id="load-modal-close" class="modal-btn cancel">닫기</button>
            </div>
        </div>
    </div>

    <!-- 팀 선택 모달 -->
    <div id="team-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content team-modal-content">
            <h2 id="team-modal-title">팀 선택</h2>
            <div class="league-tabs">
                <button class="league-tab active" data-league="K1">K1 리그</button>
                <button class="league-tab" data-league="K2">K2 리그</button>
            </div>
            <div id="team-grid" class="team-grid"></div>
            <div class="modal-actions">
                <button id="team-modal-close" class="modal-btn cancel">취소</button>
            </div>
        </div>
    </div>

    <!-- 스쿼드 불러오기 모달 -->
    <div id="squad-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content load-modal-content">
            <h2 id="squad-modal-title">스쿼드 불러오기</h2>
            <div id="squad-list" class="saves-list">
                <p class="empty-msg">저장된 스쿼드가 없습니다.</p>
            </div>
            <div class="modal-actions">
                <button id="squad-modal-close" class="modal-btn cancel">닫기</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js?v=2"></script>

    <!-- ── 매치업 비교 섹션 ─────────────────────────────── -->
    <section id="info-section">
        <div class="info-main-layout">
            <div class="info-container info-standings-sidebar">
                <div class="sidebar-header">
                    <select id="sidebar-league-select" class="sidebar-league-dropdown">
                        <option value="k1">K리그 1</option>
                        <option value="k2">K리그 2</option>
                    </select>
                </div>
                <div id="sidebar-standings-k1" class="standings-table-wrap">
                    <div class="matchup-placeholder"><span>불러오는 중...</span></div>
                </div>
                <div id="sidebar-standings-k2" class="standings-table-wrap" style="display:none;">
                    <div class="matchup-placeholder"><span>불러오는 중...</span></div>
                </div>
            </div>
            <div class="info-container matchup-right-panel">
                <div class="info-divider">
                    <span class="info-divider-label">최근 5경기 전적 비교</span>
                </div>
                <div id="matchup-area">
                    <div class="matchup-placeholder">
                        <span>위에서 HOME · AWAY 팀을 선택하면 전적이 표시됩니다</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="/static/js/info.js?v=2"></script>
    <script src="/static/js/standings.js?v=2"></script>
</body>
</html>
