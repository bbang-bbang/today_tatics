<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today Tactics - 축구 전술판</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <h1>Today Tactics</h1>
            <div class="toolbar-group">
                <label for="formation-select">포메이션:</label>
                <select id="formation-select">
                    <option value="4-4-2">4-4-2</option>
                    <option value="4-3-3">4-3-3</option>
                    <option value="3-5-2">3-5-2</option>
                    <option value="4-2-3-1">4-2-3-1</option>
                    <option value="4-1-4-1">4-1-4-1</option>
                    <option value="3-4-3">3-4-3</option>
                    <option value="5-3-2">5-3-2</option>
                    <option value="5-4-1">5-4-1</option>
                </select>
            </div>
            <div class="toolbar-group">
                <button id="btn-select" class="mode-btn active" title="선수 이동 모드">이동</button>
                <span class="toolbar-sep">|</span>
                <button class="mode-btn draw-mode-btn" data-draw="arrow" title="실선 화살표">→ 실선</button>
                <button class="mode-btn draw-mode-btn" data-draw="dashedArrow" title="점선 화살표">⇢ 점선</button>
                <button class="mode-btn draw-mode-btn" data-draw="line" title="실선">― 실선</button>
                <button class="mode-btn draw-mode-btn" data-draw="dashedLine" title="점선">┄ 점선</button>
            </div>
            <div class="toolbar-group color-swatches" title="선 색상">
                <span class="color-swatch active" data-color="rgba(255,255,255,0.85)"></span>
                <span class="color-swatch" data-color="rgba(255,68,68,0.9)"></span>
                <span class="color-swatch" data-color="rgba(68,170,255,0.9)"></span>
                <span class="color-swatch" data-color="rgba(255,221,0,0.9)"></span>
                <span class="color-swatch" data-color="rgba(68,255,100,0.9)"></span>
                <span class="color-swatch" data-color="rgba(255,140,0,0.9)"></span>
            </div>
            <div class="toolbar-group">
                <button id="btn-clear-lines" class="action-btn" title="그리기 지우기">그리기 지우기</button>
                <button id="btn-undo-line" class="action-btn" title="마지막 선 취소">실행취소</button>
                <button id="btn-reset" class="action-btn" title="전체 초기화">초기화</button>
            </div>
            <div class="toolbar-group">
                <button id="btn-save" class="action-btn save-btn" title="현재 전술 저장">저장</button>
                <button id="btn-load" class="action-btn load-btn" title="저장된 전술 불러오기">불러오기</button>
            </div>
            <div class="toolbar-group legend">
                <span class="legend-item team-a">Team A</span>
                <span class="legend-item team-b">Team B</span>
            </div>
        </header>
        <!-- 팀 선택 배너 -->
        <div id="team-banner">
            <div class="team-slot" id="slot-a">
                <div class="team-slot-badge" id="badge-a">
                    <span class="badge-letter">A</span>
                </div>
                <div class="team-slot-info">
                    <span class="team-slot-name" id="name-a">Team A</span>
                    <button class="team-pick-btn" data-side="A">팀 선택</button>
                </div>
            </div>
            <div class="team-banner-vs">VS</div>
            <div class="team-slot" id="slot-b">
                <div class="team-slot-badge" id="badge-b">
                    <span class="badge-letter">B</span>
                </div>
                <div class="team-slot-info">
                    <span class="team-slot-name" id="name-b">Team B</span>
                    <button class="team-pick-btn" data-side="B">팀 선택</button>
                </div>
            </div>
        </div>
        <div id="main-area">
            <main id="canvas-container">
                <canvas id="field"></canvas>
            </main>
            <aside id="bench-panel">
                <div class="bench-section" data-side="A">
                    <div class="bench-header">
                        <span class="bench-team-name" id="bench-name-a">Team A</span>
                        <button class="bench-add-btn" data-side="A" title="선수 추가">+ 추가</button>
                    </div>
                    <div class="bench-players" id="bench-list-a"></div>
                </div>
                <div class="bench-section" data-side="B">
                    <div class="bench-header">
                        <span class="bench-team-name" id="bench-name-b">Team B</span>
                        <button class="bench-add-btn" data-side="B" title="선수 추가">+ 추가</button>
                    </div>
                    <div class="bench-players" id="bench-list-b"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 선수 편집 팝업 -->
    <div id="player-edit-popup" class="player-edit-popup hidden">
        <div class="player-edit-header">
            <span id="player-edit-team-label" class="player-edit-team-label">Team A</span>
            <button id="player-edit-close" class="player-edit-close-btn">&times;</button>
        </div>
        <div class="player-edit-row">
            <label for="player-edit-number">등번호</label>
            <input type="number" id="player-edit-number" min="1" max="99">
        </div>
        <div class="player-edit-row">
            <label for="player-edit-name">이름</label>
            <input type="text" id="player-edit-name" maxlength="20" placeholder="선수 이름">
        </div>
        <button id="player-edit-confirm" class="player-edit-confirm-btn">확인</button>
    </div>

    <!-- 저장 모달 -->
    <div id="save-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2 id="save-modal-title">전술 저장</h2>
            <label for="save-name-input">전술 이름</label>
            <input type="text" id="save-name-input" placeholder="예: 공격 전술 A" maxlength="50">
            <div class="modal-actions">
                <button id="save-modal-cancel" class="modal-btn cancel">취소</button>
                <button id="save-modal-confirm" class="modal-btn confirm">저장</button>
            </div>
        </div>
    </div>

    <!-- 불러오기 모달 -->
    <div id="load-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content load-modal-content">
            <h2>저장된 전술</h2>
            <div id="saves-list" class="saves-list">
                <p class="empty-msg">저장된 전술이 없습니다.</p>
            </div>
            <div class="modal-actions">
                <button id="load-modal-close" class="modal-btn cancel">닫기</button>
            </div>
        </div>
    </div>

    <!-- 팀 선택 모달 -->
    <div id="team-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content team-modal-content">
            <h2 id="team-modal-title">팀 선택</h2>
            <div class="league-tabs">
                <button class="league-tab active" data-league="K1">K1 리그</button>
                <button class="league-tab" data-league="K2">K2 리그</button>
            </div>
            <div id="team-grid" class="team-grid"></div>
            <div class="modal-actions">
                <button id="team-modal-close" class="modal-btn cancel">취소</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
